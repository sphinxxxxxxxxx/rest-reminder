<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --panel-bg: rgba(20, 20, 25, 0.85); --text-color: #E2E8F0; --primary: #10B981; --danger: #059669; }
        html, body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; 
            background-color: rgba(0, 0, 0, 0) !important; user-select: none;
            -webkit-app-region: no-drag; 
        }
        body.adjust-mode { background-color: rgba(0, 0, 0, 0.6) !important; }
        #media-container { position: absolute; box-sizing: border-box; }
        body.adjust-mode #media-container { pointer-events: auto; cursor: move; outline: 2px dashed var(--primary); }
        body:not(.adjust-mode) #media-container { pointer-events: none; }
        .media-item { width: 100%; height: 100%; object-fit: contain; }
        #resize-handle { display: none; position: absolute; bottom: -6px; right: -6px; width: 16px; height: 16px; background: var(--primary); border-radius: 50%; cursor: nwse-resize; }
        body.adjust-mode #resize-handle { display: block; }
        #bottom-control-bar {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: var(--panel-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 16px 32px; border-radius: 40px; display: flex; align-items: center; gap: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); pointer-events: auto;
        }
        #countdown-box { color: var(--text-color); font-size: 22px; font-weight: 600; font-family: monospace; }
        #action-btn { background: var(--danger); color: white; border: none; padding: 10px 24px; border-radius: 20px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div id="media-container"><div id="resize-handle"></div></div>
    <div id="bottom-control-bar">
        <div id="countdown-box">00:00</div>
        <button id="action-btn">提前结束休息</button>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode'); 
        const isMain = params.get('isMain') === 'true';
        const container = document.getElementById('media-container');
        const actionBtn = document.getElementById('action-btn');
        if (mode === 'adjust') { document.body.classList.add('adjust-mode'); actionBtn.innerText = "保存布局"; }
        if (isMain && params.get('mediaPath')) {
            const path = `file://${params.get('mediaPath')}`;
            container.style.left = `${params.get('x')}px`; container.style.top = `${params.get('y')}px`;
            container.style.width = `${params.get('w')}px`; container.style.height = `${params.get('h')}px`;
            const media = document.createElement(params.get('mediaType') === 'video' ? 'video' : 'img');
            media.src = path; media.className = 'media-item';
            if (media.tagName === 'VIDEO') { media.loop = true; media.muted = true; media.play(); }
            container.prepend(media);
        }
        actionBtn.addEventListener('click', () => {
            if (mode === 'adjust') {
                const r = container.getBoundingClientRect();
                window.electronAPI.saveLayout({ x: r.left, y: r.top, width: r.width, height: r.height });
            } else window.electronAPI.endRestEarly();
        });
        if (mode === 'adjust') {
            let drag = false, resize = false, ox, oy, sw, sh, sx, sy;
            container.onmousedown = (e) => { if(e.target.id!=='resize-handle') {drag=true; ox=e.clientX-container.offsetLeft; oy=e.clientY-container.offsetTop;} };
            document.getElementById('resize-handle').onmousedown = (e) => { e.stopPropagation(); resize=true; sw=container.offsetWidth; sh=container.offsetHeight; sx=e.clientX; sy=e.clientY; };
            document.onmousemove = (e) => {
                if(drag) { container.style.left=`${e.clientX-ox}px`; container.style.top=`${e.clientY-oy}px`; }
                else if(resize) { container.style.width=`${sw+(e.clientX-sx)}px`; container.style.height=`${sh+(e.clientY-sy)}px`; }
            };
            document.onmouseup = () => drag = resize = false;
        }
        window.electronAPI.onTimerUpdate((t) => {
            const m = Math.floor(t/60).toString().padStart(2,'0'), s = (t%60).toString().padStart(2,'0');
            document.getElementById('countdown-box').innerText = `${m}:${s}`;
        });
    </script>
</body>
</html>
