<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; overflow: hidden; -webkit-app-region: no-drag; }
        body { width: 100vw; height: 100vh; background: transparent; }
        body.adjust-mode { background: rgba(0,0,0,0.6); }
        #media-container { position: absolute; box-sizing: border-box; overflow: hidden; }
        .media-item { position: absolute; width: 100%; height: 100%; object-fit: contain; top:0; left:0; }
        .hidden { display: none; }
        
        /* 【UI 重构】调整到底部，完美避开任务栏 */
        #ui-container {
            position: absolute;
            bottom: 80px; 
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            pointer-events: none;
            z-index: 10;
        }

        /* 苹果 Vision Pro 风格的高级磨砂黑底座 */
        #timer-pill {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 10px 36px;
            border-radius: 100px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden; /* 装下底部的充能条 */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 硕大且精致的倒计时字体 */
        #countdown {
            font-size: 64px;
            color: #ffffff;
            font-weight: 800;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
            line-height: 1;
            letter-spacing: 2px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* 隐藏彩蛋：集成在药丸底座底部的细线充能条 */
        #progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            width: 0%;
            background: #10B981;
            box-shadow: 0 0 15px #10B981;
            transition: width 0s linear;
        }

        #save-btn { position: fixed; bottom: 180px; left: 50%; transform: translateX(-50%); padding: 15px 40px; background: #10B981; color: white; border: none; border-radius: 30px; font-weight: 800; cursor: pointer; pointer-events: auto; display: none; font-size:16px; box-shadow: 0 10px 20px rgba(16,185,129,0.3); z-index: 20; }
        body.adjust-mode #save-btn { display: block; outline: 2px dashed #10B981; }
        #save-btn:hover { background: #059669; }
    </style>
</head>
<body>
    <div id="media-container"><div id="v-wrapper" style="width:100%; height:100%"></div><div id="handle" style="position:absolute; bottom:0; right:0; width:20px; height:20px; background:#10B981; cursor:nwse-resize; display:none; z-index:30;"></div></div>
    
    <div id="ui-container">
        <div id="timer-pill">
            <div id="countdown">00:00</div>
            <div id="progress-bar"></div>
        </div>
    </div>
    
    <button id="save-btn">退出预览模式</button>

    <script>
        const getFileUrl = (p) => 'file:///' + p.split('\\').join('/').split('/').map(s => encodeURIComponent(s)).join('/').replace('%3A', ':');
        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode'), isAdjust = mode === 'adjust', displayId = params.get('displayId'); 
        const container = document.getElementById('media-container'), wrapper = document.getElementById('v-wrapper');
        
        if (isAdjust) document.body.classList.add('adjust-mode');
        container.style.cssText = `left:${params.get('x')}px; top:${params.get('y')}px; width:${params.get('w')}px; height:${params.get('h')}px`;

        const p1 = params.get('path1'), p2 = params.get('path2');
        if (p1) {
            const v1 = document.createElement(params.get('type') === 'video' ? 'video' : 'img');
            v1.src = getFileUrl(p1); v1.className = 'media-item'; wrapper.appendChild(v1);
            if (p2 && v1.tagName === 'VIDEO') {
                const v2 = document.createElement('video'); v2.src = getFileUrl(p2); v2.className = 'media-item hidden'; v2.loop = true; v2.muted = true; wrapper.appendChild(v2);
                v1.onended = () => { v1.classList.add('hidden'); v2.classList.remove('hidden'); v2.play().catch(e=>console.log(e)); };
                v1.autoplay = true; v1.muted = true; v1.play().catch(e=>console.log(e));
            } else if (v1.tagName === 'VIDEO') { v1.loop = true; v1.autoplay = true; v1.muted = true; v1.play().catch(e=>console.log(e)); }
        }

        if (isAdjust) {
            document.getElementById('handle').style.display = 'block';
            let d = false, r = false, ox, oy, sw, sh, sx, sy;
            const saveCurrentState = () => { const rect = container.getBoundingClientRect(); window.electronAPI.updateLayout({ displayId: displayId, layout: { x: rect.left, y: rect.top, width: rect.width, height: rect.height } }); };
            container.onmousedown = e => { if(e.target.id!=='handle'){d=true; ox=e.clientX-container.offsetLeft; oy=e.clientY-container.offsetTop;} };
            document.getElementById('handle').onmousedown = e => { e.stopPropagation(); r=true; sw=container.offsetWidth; sh=container.offsetHeight; sx=e.clientX; sy=e.clientY; };
            document.onmousemove = e => { if(d) { container.style.left=`${e.clientX-ox}px`; container.style.top=`${e.clientY-oy}px`; } else if(r) { container.style.width=`${sw+(e.clientX-sx)}px`; container.style.height=`${sh+(e.clientY-sy)}px`; } };
            document.onmouseup = () => { if (d || r) saveCurrentState(); d = r = false; };
            window.onblur = () => { if (d || r) saveCurrentState(); d = r = false; };
            document.getElementById('save-btn').onclick = () => window.electronAPI.exitAdjustMode();
        }

        let escTimer = null, holdStarted = false;
        const progressBar = document.getElementById('progress-bar');
        const countdown = document.getElementById('countdown');

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape' && !isAdjust && !holdStarted) {
                holdStarted = true;
                // 变绿提示正在触发盲操
                countdown.style.color = '#10B981';
                
                progressBar.style.transition = 'width 2s cubic-bezier(0.2, 1, 0.3, 1)';
                requestAnimationFrame(() => { progressBar.style.width = '100%'; });

                escTimer = setTimeout(() => { window.electronAPI.endRestEarly(); }, 2000);
            }
        });
        
        document.addEventListener('keyup', e => {
            if (e.key === 'Escape') { 
                clearTimeout(escTimer); holdStarted = false; 
                countdown.style.color = '#ffffff';
                
                progressBar.style.transition = 'width 0.2s ease-out';
                progressBar.style.width = '0%';
            }
        });

        window.electronAPI.onTimerUpdate(t => { const m = Math.floor(t/60).toString().padStart(2,'0'), s = (t%60).toString().padStart(2,'0'); document.getElementById('countdown').innerText = `${m}:${s}`; });
        window.electronAPI.onCleanup(() => { wrapper.innerHTML = ''; });
    </script>
</body>
</html>
