<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; overflow: hidden; -webkit-app-region: no-drag; }
        body { width: 100vw; height: 100vh; background: transparent; user-select: none; }
        body.adjust-mode { background: rgba(0,0,0,0.6); }
        
        #media-container { position: absolute; box-sizing: border-box; overflow: hidden; }
        .media-item { position: absolute; width: 100%; height: 100%; object-fit: contain; top:0; left:0; }
        .hidden { display: none; }
        
        /* 布局：远离任务栏，高雅悬浮于底部偏上 */
        #ui-wrapper {
            position: absolute;
            bottom: 80px; 
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        /* 纯正无伪影的磨砂黑胶药丸 */
        #timer-pill {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 16px 44px;
            border-radius: 80px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 修复字体字间距带来的右侧留白偏移，实现视觉绝对居中 */
        #countdown {
            font-size: 64px;
            color: #ffffff;
            font-weight: 700;
            font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
            line-height: 1; 
            letter-spacing: 4px;
            margin-right: -4px; 
            text-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: color 0.3s ease;
        }

        /* 隐秘退出彩蛋：分离式流光充能条 */
        #progress-track {
            width: 80%;
            height: 4px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            margin-top: 14px;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.3s ease;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        #progress-fill {
            height: 100%;
            width: 0%;
            background: #10B981;
            box-shadow: 0 0 12px #10B981;
        }

        #save-btn { position: fixed; bottom: 200px; left: 50%; transform: translateX(-50%); padding: 15px 40px; background: #10B981; color: white; border: none; border-radius: 30px; font-weight: 800; cursor: pointer; pointer-events: auto; display: none; font-size:16px; box-shadow: 0 10px 20px rgba(16,185,129,0.3); z-index: 20; }
        body.adjust-mode #save-btn { display: block; outline: 2px dashed #10B981; }
        #save-btn:hover { background: #059669; }
    </style>
</head>
<body>
    <div id="media-container">
        <div id="v-wrapper" style="width:100%; height:100%"></div>
        <div id="handle" style="position:absolute; bottom:0; right:0; width:20px; height:20px; background:#10B981; cursor:nwse-resize; display:none; z-index:30;"></div>
    </div>
    
    <div id="ui-wrapper">
        <div id="timer-pill"><div id="countdown">00:00</div></div>
        <div id="progress-track"><div id="progress-fill"></div></div>
    </div>
    
    <button id="save-btn">退出预览模式</button>

    <script>
        // 终极路径解析算法：完美兼容带有空格、井号、中文字符的任意盘符路径
        const getFileUrl = (filepath) => {
            if (!filepath) return '';
            const pathPosix = filepath.replace(/\\/g, '/');
            const encodedPath = pathPosix.split('/').map(encodeURIComponent).join('/');
            return 'file:///' + encodedPath.replace('%3A', ':'); 
        };

        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode'), isAdjust = mode === 'adjust', displayId = params.get('displayId'); 
        const container = document.getElementById('media-container'), wrapper = document.getElementById('v-wrapper');
        
        if (isAdjust) document.body.classList.add('adjust-mode');
        container.style.cssText = `left:${params.get('x')}px; top:${params.get('y')}px; width:${params.get('w')}px; height:${params.get('h')}px`;

        const p1 = params.get('path1'), p2 = params.get('path2');
        if (p1) {
            const v1 = document.createElement(params.get('type') === 'video' ? 'video' : 'img');
            v1.src = getFileUrl(p1); v1.className = 'media-item'; wrapper.appendChild(v1);
            if (p2 && v1.tagName === 'VIDEO') {
                const v2 = document.createElement('video'); v2.src = getFileUrl(p2); v2.className = 'media-item hidden'; v2.loop = true; v2.muted = true; wrapper.appendChild(v2);
                v1.onended = () => { v1.classList.add('hidden'); v2.classList.remove('hidden'); v2.play().catch(e=>console.log('Video Play Error:', e)); };
                v1.autoplay = true; v1.muted = true; v1.play().catch(e=>console.log('Video Play Error:', e));
            } else if (v1.tagName === 'VIDEO') { 
                v1.loop = true; v1.autoplay = true; v1.muted = true; v1.play().catch(e=>console.log('Video Play Error:', e)); 
            }
        }

        // 调整模式下的独立存储与多指防粘连
        if (isAdjust) {
            document.getElementById('handle').style.display = 'block';
            let d = false, r = false, ox, oy, sw, sh, sx, sy;
            const saveCurrentState = () => { const rect = container.getBoundingClientRect(); window.electronAPI.updateLayout({ displayId: displayId, layout: { x: rect.left, y: rect.top, width: rect.width, height: rect.height } }); };
            container.onmousedown = e => { if(e.target.id!=='handle'){d=true; ox=e.clientX-container.offsetLeft; oy=e.clientY-container.offsetTop;} };
            document.getElementById('handle').onmousedown = e => { e.stopPropagation(); r=true; sw=container.offsetWidth; sh=container.offsetHeight; sx=e.clientX; sy=e.clientY; };
            document.onmousemove = e => { if(d) { container.style.left=`${e.clientX-ox}px`; container.style.top=`${e.clientY-oy}px`; } else if(r) { container.style.width=`${sw+(e.clientX-sx)}px`; container.style.height=`${sh+(e.clientY-sy)}px`; } };
            document.onmouseup = () => { if (d || r) saveCurrentState(); d = r = false; };
            window.onblur = () => { if (d || r) saveCurrentState(); d = r = false; };
            document.getElementById('save-btn').onclick = () => window.electronAPI.exitAdjustMode();
        }

        // 彩蛋级隐蔽交互：长按防作弊退出机制
        let escTimer = null, holdStarted = false;
        const progressTrack = document.getElementById('progress-track');
        const progressFill = document.getElementById('progress-fill');
        const countdown = document.getElementById('countdown');

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape' && !isAdjust && !holdStarted) {
                holdStarted = true;
                countdown.style.color = '#10B981'; // 变绿提示触发盲操
                progressTrack.style.opacity = '1';
                progressFill.style.transition = 'width 2s cubic-bezier(0.2, 1, 0.3, 1)';
                
                // 强制下一帧重绘，确保 CSS 过渡动画丝滑执行
                requestAnimationFrame(() => { progressFill.style.width = '100%'; });
                escTimer = setTimeout(() => { window.electronAPI.endRestEarly(); }, 2000);
            }
        });
        
        document.addEventListener('keyup', e => {
            if (e.key === 'Escape') { 
                clearTimeout(escTimer); 
                holdStarted = false; 
                countdown.style.color = '#ffffff';
                progressFill.style.transition = 'width 0.15s ease-out';
                progressFill.style.width = '0%';
                setTimeout(() => { if (!holdStarted) progressTrack.style.opacity = '0'; }, 150);
            }
        });

        window.electronAPI.onTimerUpdate(t => { const m = Math.floor(t/60).toString().padStart(2,'0'), s = (t%60).toString().padStart(2,'0'); document.getElementById('countdown').innerText = `${m}:${s}`; });
        window.electronAPI.onCleanup(() => { wrapper.innerHTML = ''; });
    </script>
</body>
</html>
