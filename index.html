<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Rest Reminder</title>
    <style>
        :root { --primary: #10B981; --gradient: linear-gradient(135deg, #34D399 0%, #059669 100%); }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: transparent; font-family: 'Poppins', -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; }
        .window-frame { width: 95%; height: 90%; border-radius: 24px; position: relative; background: linear-gradient(45deg, #a8edea 0%, #fed6e3 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        
        .drag-bar { position: absolute; top: 0; width: 100%; height: 45px; -webkit-app-region: drag; display: flex; justify-content: flex-end; padding: 10px 20px; z-index: 100; }
        .drag-bar button { -webkit-app-region: no-drag; background: rgba(255,255,255,0.3); border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; margin-left: 10px; color:#2B3674; font-weight:bold; transition:0.2s;}
        .drag-bar button:hover { background: rgba(255,255,255,0.6); }
        .drag-bar #close-btn:hover { background: #ff4757; color: white; }
        
        .glass-panel { background: rgba(255, 255, 255, 0.35); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.5); border-radius: 24px; padding: 30px; width: 90%; }
        
        .fade-in { animation: smoothShow 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes smoothShow { 0% { opacity: 0; transform: scale(0.95) translateY(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .card { background: rgba(255,255,255,0.5); padding: 18px; border-radius: 16px; height:100%; }
        h2 { font-size: 14px; margin-bottom: 15px; color: #1e293b; opacity: 0.8; font-weight: 700; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 13px; font-weight: 600; color: #334155; }
        input { width: 60px; border: none; border-radius: 8px; padding: 5px; text-align: center; background: white; color: var(--primary); font-weight: 700; }
        button.btn { border: none; border-radius: 12px; cursor: pointer; font-weight: 700; transition: 0.3s; display:flex; align-items:center; justify-content:center; }
        .btn-outline { background: white; color: var(--primary); border: 1px solid var(--primary); padding: 8px 15px; font-size: 12px; }
        .btn-outline:hover:not(:disabled) { background: var(--primary); color: white; }
        .btn-outline:disabled { opacity:0.5; cursor:not-allowed; }
        .btn-main { width: 100%; padding: 15px; background: var(--gradient); color: white; font-size: 16px; box-shadow: 0 10px 20px rgba(16,185,129,0.2); }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(16,185,129,0.35); }
        
        #working-view { text-align: center; }
        .timer { font-size: 80px; font-weight: 800; color: var(--primary); margin: 20px 0; font-family: monospace; text-shadow: 0 4px 15px rgba(16,185,129,0.2);}
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>
    <div class="window-frame">
        <div class="drag-bar"><button id="min-btn">－</button><button id="close-btn">✕</button></div>
        
        <div class="glass-panel fade-in" id="setup-view">
            <div class="grid">
                <div class="card">
                    <h2>⏱ 时间设定 (Min)</h2>
                    <div class="row">专注时长 <input type="number" id="workTime" value="45"></div>
                    <div class="row">休息时长 <input type="number" id="restTime" value="5"></div>
                </div>
                <div class="card">
                    <h2>🎨 媒体资产加载</h2>
                    <div class="row"><button id="up1" class="btn btn-outline">📁 上传出场</button><span id="s1" style="font-size:10px; color:#64748b">未就绪</span></div>
                    <div id="secondary-area" style="display:none"><div class="row"><button id="up2" class="btn btn-outline">📁 增加循环</button><span id="s2" style="font-size:10px; color:#64748b">未就绪</span></div></div>
                    <button id="previewBtn" class="btn btn-outline" style="width:100%;margin-top:5px" disabled>👁️ 预览与排版</button>
                </div>
            </div>
            <button id="startBtn" class="btn btn-main">🚀 开启专注循环</button>
        </div>

        <div class="glass-panel" id="working-view" style="display:none">
            <div style="font-weight:600; color:#64748b; font-size:18px;">正在专注中，请保持高效...</div>
            <div id="main-countdown" class="timer">00:00</div>
            <div style="display:flex; gap:15px; justify-content:center;">
                <button id="continueBtn" class="btn btn-outline" style="width:140px; padding:12px; font-size:14px;">继续后台运行</button>
                <button id="restartBtn" class="btn btn-main" style="width:140px; padding:12px; font-size:14px;">重新开始计时</button>
            </div>
        </div>
    </div>
    
    <script>
        const $ = id => document.getElementById(id);
        $('min-btn').onclick = () => window.electronAPI.minWindow();
        $('close-btn').onclick = () => window.electronAPI.hideWindow();
        
        function switchView(toWorking) {
            if (toWorking) {
                $('setup-view').style.display = 'none';
                $('working-view').style.display = 'block';
                $('working-view').classList.remove('fade-in');
                void $('working-view').offsetWidth; 
                $('working-view').classList.add('fade-in');
            } else {
                $('working-view').style.display = 'none';
                $('setup-view').style.display = 'block';
                $('setup-view').classList.remove('fade-in');
                void $('setup-view').offsetWidth;
                $('setup-view').classList.add('fade-in');
            }
        }

        window.electronAPI.onStateSync(d => {
            switchView(d.state === 'working');
            $('workTime').value = d.workTime || 45; $('restTime').value = d.restTime || 5;
            if (d.hasPrimary) { $('s1').innerText = '✅ OK'; $('s1').style.color = '#10B981'; $('previewBtn').disabled = false; $('secondary-area').style.display = 'block'; }
            if (d.hasSecondary) { $('s2').innerText = '✅ OK'; $('s2').style.color = '#10B981'; } else { $('s2').innerText = '未就绪'; $('s2').style.color = '#64748b'; }
        });

        window.electronAPI.onMainTimerTick(t => {
            const m = Math.floor(t/60).toString().padStart(2,'0'), s = (t%60).toString().padStart(2,'0');
            $('main-countdown').innerText = `${m}:${s}`;
        });

        $('up1').onclick = async () => { const r = await window.electronAPI.uploadMedia(false); if(r) { $('s1').innerText = '✅ OK'; $('s1').style.color = '#10B981'; $('secondary-area').style.display = 'block'; $('previewBtn').disabled = false; if(!r.hasSecondary) { $('s2').innerText = '未就绪'; $('s2').style.color = '#64748b'; } } };
        $('up2').onclick = async () => { const r = await window.electronAPI.uploadMedia(true); if(r) { $('s2').innerText = '✅ OK'; $('s2').style.color = '#10B981'; } };
        
        const getC = () => ({ workTime: parseInt($('workTime').value), restTime: parseInt($('restTime').value) });
        $('previewBtn').onclick = () => window.electronAPI.previewMode(getC());
        
        $('startBtn').onclick = () => { window.electronAPI.startWork(getC()); switchView(true); };
        $('continueBtn').onclick = () => window.electronAPI.hideWindow();
        $('restartBtn').onclick = () => window.electronAPI.restartWork();
    </script>
</body>
</html>
