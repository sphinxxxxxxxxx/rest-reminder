<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Rest Reminder</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F4F7FE;
            --card-bg: #FFFFFF;
            --text-main: #2B3674;
            --text-sub: #A3AED0;
            --primary: #10B981; /* 护眼绿 */
            --primary-light: #D1FAE5;
            --gradient-btn: linear-gradient(135deg, #34D399 0%, #059669 100%);
            --shadow-card: 0px 18px 40px rgba(112, 144, 176, 0.12);
            --shadow-btn: 0px 10px 20px rgba(16, 185, 129, 0.25);
            --radius-xl: 24px;
            --radius-lg: 16px;
            --radius-md: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 20px; 
            background: var(--bg-color); 
            color: var(--text-main); 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* 固定高度 */
            overflow: hidden; /* 【修改】彻底屏蔽滚动条 */
        }

        .app-wrapper {
            width: 100%;
            max-width: 720px; /* 【修改】加宽内容区以适应横排 */
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            background: var(--gradient-btn);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .header p {
            color: var(--text-sub);
            font-size: 13px;
        }

        /* 【修改】横向栅格布局 */
        .grid-row {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 左右平分 */
            gap: 20px;
            margin-bottom: 20px;
        }

        .card { 
            background: var(--card-bg); 
            padding: 24px; 
            border-radius: var(--radius-xl); 
            box-shadow: var(--shadow-card); 
            transition: transform 0.3s ease;
            height: 100%; /* 卡片等高 */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        h2 { 
            font-size: 16px; 
            font-weight: 700; 
            margin-bottom: 20px; 
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group { 
            margin-bottom: 16px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: var(--bg-color);
            padding: 12px 16px;
            border-radius: var(--radius-lg);
        }
        
        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-group label {
            font-weight: 600;
            font-size: 14px;
        }

        input[type="number"] { 
            width: 70px; 
            padding: 8px 12px; 
            border: none; 
            background: var(--card-bg);
            border-radius: var(--radius-md); 
            text-align: center; 
            font-weight: 700;
            color: var(--primary);
            font-size: 16px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            outline: none;
            transition: all 0.2s;
        }

        input[type="number"]:focus {
            box-shadow: 0 0 0 2px var(--primary-light);
        }

        button { 
            font-family: inherit;
            font-weight: 700;
            border: none; 
            border-radius: var(--radius-lg); 
            cursor: pointer; 
            font-size: 14px; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:active {
            transform: scale(0.96);
        }

        /* 轮廓按钮 (上传/预览) */
        button.outline { 
            background: var(--primary-light); 
            color: var(--primary); 
            padding: 10px 20px;
        }

        button.outline:hover:not(:disabled) { 
            background: var(--primary); 
            color: white;
            box-shadow: var(--shadow-btn);
        }

        button.outline:disabled {
            background: #e2e8f0;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }

        /* 主按钮 (开始工作) */
        #startBtn { 
            width: 100%; 
            font-size: 16px; 
            padding: 18px; 
            background: var(--gradient-btn);
            color: white;
            box-shadow: var(--shadow-btn);
            border-radius: var(--radius-xl);
            margin-top: 10px;
        }

        #startBtn:hover {
            box-shadow: 0px 15px 25px rgba(16, 185, 129, 0.35);
            transform: translateY(-2px);
        }

        #mediaStatus {
            font-size: 13px;
            color: var(--text-sub);
            font-weight: 600;
        }

        .status-box {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: var(--text-sub);
            background: rgba(255,255,255,0.5);
            padding: 12px;
            border-radius: var(--radius-md);
        }

        .notice { color: #FF8A65; font-weight: 600; }
        
        /* 隐藏 input type number 的上下箭头 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <div class="header">
            <h1>Rest Reminder</h1>
            <p>Stay focused, stay healthy 🌿</p>
        </div>

        <div class="grid-row">
            <!-- 左侧：时间设置 -->
            <div class="card">
                <h2>⏱ 时间设置</h2>
                <div class="form-group">
                    <label>专注时长 (Min)</label>
                    <input type="number" id="workTime" value="45" min="1">
                </div>
                <div class="form-group">
                    <label>休息时长 (Min)</label>
                    <input type="number" id="restTime" value="5" min="1">
                </div>
            </div>

            <!-- 右侧：媒体设置 -->
            <div class="card">
                <h2>🎨 个性化打断层</h2>
                <div class="form-group" style="background: transparent; padding: 0; margin-bottom: 16px;">
                    <button id="uploadBtn" class="outline">📁 选择媒体</button>
                    <span id="mediaStatus">未选择文件</span>
                </div>
                <button id="previewBtn" class="outline" style="width: 100%; padding: 14px;" disabled>👁️ 进入 UI 调整与预览</button>
            </div>
        </div>

        <button id="startBtn">🚀 开始专注模式</button>
        
        <div class="status-box">
            <span id="status">点击开始后，我将在系统托盘默默守护你。</span>
        </div>
    </div>

    <script>
        // 兼容浏览器预览环境
        if (!window.electronAPI) {
            window.electronAPI = {
                uploadMedia: async () => {
                    const statusEl = document.getElementById('status');
                    statusEl.innerText = "提示：当前为预览环境，模拟上传成功。";
                    statusEl.className = "notice";
                    return { mediaPath: 'mock-path.png' };
                },
                previewMode: (config) => {
                    const statusEl = document.getElementById('status');
                    statusEl.innerText = `提示：模拟预览 (工作 ${config.workTime}分, 休息 ${config.restTime}分)。`;
                    statusEl.className = "notice";
                },
                startWork: (config) => {
                    const statusEl = document.getElementById('status');
                    statusEl.innerText = `提示：模拟开始。真实环境将最小化到托盘。`;
                    statusEl.className = "notice";
                }
            };
        }

        let hasMedia = false;

        document.getElementById('uploadBtn').addEventListener('click', async () => {
            const result = await window.electronAPI.uploadMedia();
            if (result && result.mediaPath) {
                hasMedia = true;
                const statusText = document.getElementById('mediaStatus');
                statusText.innerText = '✨ 媒体已就绪';
                statusText.style.color = 'var(--primary)';
                document.getElementById('previewBtn').disabled = false;
            }
        });

        const getConfig = () => ({
            workTime: parseInt(document.getElementById('workTime').value) || 45,
            restTime: parseInt(document.getElementById('restTime').value) || 5
        });

        document.getElementById('previewBtn').addEventListener('click', () => {
            window.electronAPI.previewMode(getConfig());
        });

        document.getElementById('startBtn').addEventListener('click', () => {
            window.electronAPI.startWork(getConfig());
        });
    </script>
</body>
</html>
