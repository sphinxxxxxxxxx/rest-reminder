<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Rest Reminder</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F4F7FE; --card-bg: #FFFFFF; --text-main: #2B3674; --text-sub: #A3AED0;
            --primary: #10B981; --primary-light: #D1FAE5;
            --gradient-btn: linear-gradient(135deg, #34D399 0%, #059669 100%);
            --shadow-card: 0px 18px 40px rgba(112, 144, 176, 0.12);
            --shadow-btn: 0px 10px 20px rgba(16, 185, 129, 0.25);
            --radius-xl: 24px; --radius-lg: 16px; --radius-md: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; padding: 20px; background: var(--bg-color); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .app-wrapper { width: 100%; max-width: 720px; }
        .header { text-align: center; margin-bottom: 24px; }
        .header h1 { font-size: 24px; font-weight: 700; background: var(--gradient-btn); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .grid-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: var(--card-bg); padding: 24px; border-radius: var(--radius-xl); box-shadow: var(--shadow-card); display: flex; flex-direction: column; justify-content: center; }
        h2 { font-size: 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .form-group { margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; background: var(--bg-color); padding: 12px 16px; border-radius: var(--radius-lg); }
        input[type="number"] { width: 70px; padding: 8px; border: none; border-radius: var(--radius-md); text-align: center; font-weight: 700; color: var(--primary); outline: none; }
        button { font-family: inherit; font-weight: 700; border: none; border-radius: var(--radius-lg); cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        button.outline { background: var(--primary-light); color: var(--primary); padding: 10px 20px; }
        button.outline:hover:not(:disabled) { background: var(--primary); color: white; }
        #startBtn { width: 100%; font-size: 16px; padding: 18px; background: var(--gradient-btn); color: white; box-shadow: var(--shadow-btn); border-radius: var(--radius-xl); }
        .status-box { text-align: center; margin-top: 15px; font-size: 12px; color: var(--text-sub); }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <div class="header">
            <h1>Rest Reminder</h1>
            <p>Stay focused, stay healthy 🌿</p>
        </div>
        <div class="grid-row">
            <div class="card">
                <h2>⏱ 时间设置</h2>
                <div class="form-group"><label>专注时长 (Min)</label><input type="number" id="workTime" value="45"></div>
                <div class="form-group"><label>休息时长 (Min)</label><input type="number" id="restTime" value="5"></div>
            </div>
            <div class="card">
                <!-- 【修改点】更新了格式提示 -->
                <h2>🎨 个性化打断层 (支持图片/动图/视频)</h2>
                <div class="form-group" style="background: transparent; padding: 0;"><button id="uploadBtn" class="outline">📁 选择媒体</button><span id="mediaStatus" style="font-size:12px">未选择</span></div>
                <button id="previewBtn" class="outline" style="width:100%" disabled>👁️ 预览与调整</button>
            </div>
        </div>
        <button id="startBtn">🚀 开始专注模式</button>
        <div class="status-box"><span id="status">驻留在系统托盘守护你。</span></div>
    </div>
    <script>
        document.getElementById('uploadBtn').addEventListener('click', async () => {
            const result = await window.electronAPI.uploadMedia();
            if (result) {
                document.getElementById('mediaStatus').innerText = '✨ 已就绪';
                document.getElementById('previewBtn').disabled = false;
            }
        });
        const getConfig = () => ({ workTime: parseInt(document.getElementById('workTime').value), restTime: parseInt(document.getElementById('restTime').value) });
        document.getElementById('previewBtn').addEventListener('click', () => window.electronAPI.previewMode(getConfig()));
        document.getElementById('startBtn').addEventListener('click', () => window.electronAPI.startWork(getConfig()));
    </script>
</body>
</html>
